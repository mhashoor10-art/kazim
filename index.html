<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <!-- SEO -->
  <meta name="description" content="Best blog website for tech tips, online earning and tutorials">
  <meta name="keywords" content="blog, tech, earning, tips, tutorials">
  <meta name="author" content="Kazim">
<meta name="google-site-verification" content="hbqEwgtUnMeSxn1KEhRA5B1kOg2VYHIHXixzDodGeY0" />
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://mhashoor10-art.github.io/kazim/">
  <title>Kazim Blog | Tech Tips & Online Earning 🚀</title>

  <style>
    body { font-family: Arial; padding: 20px; }
    .dark { background: #111; color: white; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  </style>
</head>

<body>

<button onclick="toggleDark()">🌙</button>
<input id="search" placeholder="Search..." oninput="filterBlogs()">

<h2>Blogs</h2>
<div id="blogs"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
  storageBucket: "kazim-aa621.firebasestorage.app",
  messagingSenderId: "1013202883035",
  appId: "1:1013202883035:web:777c341cfc6c14d3a217fe",
  measurementId: "G-0MK223J467"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allBlogs = [];

const data = await getDocs(collection(db, "blogs"));

data.forEach((docSnap) => {
  let b = docSnap.data();
  b.id = docSnap.id;
  allBlogs.push(b);
});

function show(list) {
  blogs.innerHTML = "";
  list.forEach(b => {
    blogs.innerHTML += `
      <div class="card">
        <h3>${b.title}</h3>
        <img src="${b.img}" width="100%">
        <p>${b.desc}</p>
        <a href="post.html?id=${b.id}">Read More</a>
      </div>
    `;
  });
}

// 🔍 SEARCH
window.filterBlogs = function() {
  let q = search.value.toLowerCase();
  let filtered = allBlogs.filter(b => b.title.toLowerCase().includes(q));
  show(filtered);
};

// 🌙 DARK MODE SAVE
function toggleDark() {
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", document.body.classList.contains("dark"));
}

if (localStorage.getItem("dark") === "true") {
  document.body.classList.add("dark");
}

show(allBlogs);
</script>

</body>
</html>
