<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #333;
    }

    .card {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .delete-btn {
      background: red;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h2>Admin Panel 🚀</h2>

<!-- INPUTS -->
<input id="title" placeholder="Blog Title">
<input id="desc" placeholder="Blog Description">
<input id="img" placeholder="Image URL">
<textarea id="content" placeholder="Full Blog Content"></textarea>
<input id="author" placeholder="Author Name">

<button onclick="addBlog()">Add Blog</button>

<h3>All Blogs</h3>
<div id="list"></div>

<script>
let blogs = JSON.parse(localStorage.getItem("blogs")) || [];

/* SAVE */
function save() {
  localStorage.setItem("blogs", JSON.stringify(blogs));
}

/* ADD BLOG */
function addBlog() {
  let blog = {
    id: Date.now(),
    title: document.getElementById("title").value,
    desc: document.getElementById("desc").value,
    img: document.getElementById("img").value,
    content: document.getElementById("content").value,
    author: document.getElementById("author").value,
    date: new Date().toDateString()
  };

  blogs.push(blog);
  save();
  show();

  alert("Blog Added 🚀");

  clearForm();
}

/* CLEAR FORM */
function clearForm() {
  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("img").value = "";
  document.getElementById("content").value = "";
  document.getElementById("author").value = "";
}

/* DELETE */
function deleteBlog(index) {
  blogs.splice(index, 1);
  save();
  show();
}

/* SHOW BLOGS */
function show() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  blogs.forEach((b, i) => {
    list.innerHTML += `
      <div class="card">
        <h4>${b.title}</h4>
        <p>${b.desc}</p>
        <small>${b.date}</small>
        <button class="delete-btn" onclick="deleteBlog(${i})">Delete</button>
      </div>
    `;
  });
}

show();
</script>

</body>
</html>
