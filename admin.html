<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: black;
      color: white;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Admin Panel 🚀</h2>

<input id="title" placeholder="Blog Title">
<input id="desc" placeholder="Blog Description">
<input id="img" placeholder="Image URL">
<input id="link" placeholder="Blog Link (blog1.html)">
<input id="author" placeholder="Author Name">

<button onclick="addBlog()">Add Blog</button>

<h3>All Blogs</h3>
<div id="list"></div>

<script>
let blogs = JSON.parse(localStorage.getItem("blogs")) || [];

function save() {
  localStorage.setItem("blogs", JSON.stringify(blogs));
}

function addBlog() {
  let blog = {
    title: document.getElementById("title").value,
    desc: document.getElementById("desc").value,
    img: document.getElementById("img").value,
    link: document.getElementById("link").value,
    author: document.getElementById("author").value,
    date: new Date().toDateString()
  };

  blogs.push(blog);
  save();
  show();
}

function deleteBlog(index) {
  blogs.splice(index, 1);
  save();
  show();
}

function show() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  blogs.forEach((b, i) => {
    list.innerHTML += `
      <div class="card">
        <h4>${b.title}</h4>
        <button onclick="deleteBlog(${i})">Delete</button>
      </div>
    `;
  });
}

show();
</script>

</body>
</html>
