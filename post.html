<!DOCTYPE html>
<html>
<head>
  <title>Blog</title>
  <meta name="description" content="Read blog post">
</head>

<body>

<div id="post"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
  storageBucket: "kazim-aa621.firebasestorage.app",
  messagingSenderId: "1013202883035",
  appId: "1:1013202883035:web:777c341cfc6c14d3a217fe",
  measurementId: "G-0MK223J467"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let id = new URLSearchParams(location.search).get("id");

const snap = await getDoc(doc(db, "blogs", id));

if (snap.exists()) {
  let b = snap.data();

  post.innerHTML = `
    <h1>${b.title}</h1>
    <img src="${b.img}" width="100%">
    <p>${b.content}</p>
    <small>${b.author} | ${b.date}</small>
  `;
}
</script>

</body>
</html>
