<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <div id="post">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBlQP-s0Q-y6J1POkEEHrcDP32Wn6JPK_4",
  authDomain: "kazim-aa621.firebaseapp.com",
  projectId: "kazim-aa621",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URL se ID lena
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const postDiv = document.getElementById("post");

async function loadPost() {
  if (!id) {
    postDiv.innerHTML = "No post found";
    return;
  }

  try {
    const ref = doc(db, "blogs", id);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      postDiv.innerHTML = "Post not found";
      return;
    }

    const blog = snap.data();

    postDiv.innerHTML = `
      <div class="card">
        <img src="${blog.img || "https://via.placeholder.com/600"}">
        <h1>${blog.title}</h1>
        <p><b>By:</b> ${blog.author || "Admin"}</p>
        <small>${blog.date || ""}</small>
        <hr>
        <p>${blog.content || ""}</p>
      </div>
    `;
  } catch (err) {
    console.error(err);
    postDiv.innerHTML = "Error loading post";
  }
}

loadPost();
</script>

</body>
</html>
